# ============================================================
# 易聊智能 - Nginx 配置
# 功能：静态文件服务 + API 反向代理 + SSE 流式支持 + HTTPS
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript;

    # ---- 上游后端服务 ----
    upstream backend {
        server yiliao-backend:3000;
        keepalive 32;
    }

    # ---- HTTP → HTTPS 重定向（有证书时启用）----
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$server_name$request_uri;
    # }

    server {
        listen 80;
        server_name _;

        # 客户端上传大小限制
        client_max_body_size 10m;

        # ---- 前端静态文件 ----
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # 静态资源缓存
            location ~* \.(html)$ {
                add_header Cache-Control "no-cache, must-revalidate";
            }
            location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 7d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ---- API 代理 ----
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # 标准代理头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE 流式支持（关键！）
            proxy_set_header Connection '';
            proxy_buffering off;          # 关闭缓冲，实时转发
            proxy_cache off;
            chunked_transfer_encoding on;

            # 超时设置（AI 对话可能很长）
            proxy_read_timeout 300s;      # 5 分钟
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # ---- 健康检查 ----
        location /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
