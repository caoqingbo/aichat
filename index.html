<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <link rel="stylesheet" href="style.css">
    <!-- marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- highlight.js for code highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <button id="newChatBtn" class="new-chat-btn">+ 新对话</button>
        </div>
        <div id="chatList" class="chat-list">
            <!-- Chat history items will be inserted here -->
        </div>
        <div class="sidebar-footer">
            <div class="settings-btn" id="settingsBtn">⚙ 设置</div>
        </div>
    </div>

    <!-- Toggle sidebar button -->
    <button id="sidebarToggle" class="sidebar-toggle">☰</button>

    <!-- Main content -->
    <div class="main">
        <!-- Messages area -->
        <div id="messages" class="messages">
            <div class="welcome">
                <h1>🤖 AI Chat</h1>
                <p>选择模型并开始对话</p>
            </div>
        </div>

        <!-- Input area -->
        <div class="input-area">
            <div class="input-container">
                <textarea id="userInput" placeholder="输入消息... (Shift+Enter 换行)" rows="1"></textarea>
                <button id="sendBtn" class="send-btn" title="发送">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"/>
                    </svg>
                </button>
            </div>
            <div class="input-footer">
                <select id="modelSelect">
                    <optgroup label="DeepSeek">
                        <option value="deepseek-chat">DeepSeek V3</option>
                        <option value="deepseek-reasoner">DeepSeek R1</option>
                        <option value="xiaomi/mimo-v2-flash">MiMo V2 Flash</option>
                    </optgroup>
                    <optgroup label="OpenAI">
                        <option value="gpt-4o">GPT-4o</option>
                        <option value="gpt-4o-mini">GPT-4o Mini</option>
                        <option value="gpt-4.1">GPT-4.1</option>
                        <option value="gpt-4.1-mini">GPT-4.1 Mini</option>
                        <option value="gpt-4.1-nano">GPT-4.1 Nano</option>
                        <option value="o4-mini">o4-mini</option>
                        <option value="o3">o3</option>
                        <option value="o3-mini">o3 Mini</option>
                        <option value="o3-pro">o3 Pro</option>
                    </optgroup>
                    <optgroup label="OpenRouter">
                        <option value="anthropic/claude-sonnet-4">Claude Sonnet 4</option>
                        <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
                        <option value="anthropic/claude-3-opus">Claude 3 Opus</option>
                        <option value="google/gemini-2.5-pro">Gemini 2.5 Pro</option>
                        <option value="google/gemini-2.5-flash">Gemini 2.5 Flash</option>
                        <option value="meta-llama/llama-4-maverick">Llama 4 Maverick</option>
                        <option value="qwen/qwen3-235b-a22b">Qwen3 235B</option>
                        <option value="deepseek/deepseek-chat-v3-0324">DeepSeek V3 (OR)</option>
                        <option value="deepseek/deepseek-r1">DeepSeek R1 (OR)</option>
                    </optgroup>
                </select>
                <span id="tokenCount" class="token-count"></span>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>设置</h2>
                <button class="close-btn" id="closeSettings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>DeepSeek API Key</label>
                    <input type="password" id="apiKeyDeepseek" placeholder="sk-..." />
                </div>
                <div class="form-group">
                    <label>OpenAI API Key</label>
                    <input type="password" id="apiKeyOpenai" placeholder="sk-..." />
                </div>
                <div class="form-group">
                    <label>OpenRouter API Key</label>
                    <input type="password" id="apiKeyOpenrouter" placeholder="sk-or-..." />
                </div>
                <div class="form-group">
                    <label>API 地址 (自动切换，可手动覆盖)</label>
                    <input type="text" id="apiBase" placeholder="https://api.deepseek.com" />
                </div>
                <div class="form-group">
                    <label>系统提示词 (System Prompt)</label>
                    <textarea id="systemPrompt" rows="3" placeholder="你是一个有帮助的AI助手。"></textarea>
                </div>
                <div class="form-group">
                    <label>Temperature</label>
                    <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" />
                    <span id="tempValue">0.7</span>
                </div>
                <div class="form-group">
                    <label>上下文消息数</label>
                    <input type="number" id="contextMessages" min="1" max="50" value="10" />
                </div>
                <button class="save-btn" id="saveSettings">保存设置</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
