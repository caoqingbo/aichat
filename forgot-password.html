<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易聊智能 - 找回密码</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .forgot-container { max-width: 440px; margin: 80px auto; padding: 32px; }
        .forgot-container h1 { text-align: center; margin-bottom: 8px; }
        .forgot-container .subtitle { text-align: center; color: var(--muted,#888); margin-bottom: 28px; }
        .forgot-step { display: none; }
        .forgot-step.active { display: block; }
        .forgot-container .form-group { margin-bottom: 16px; }
        .forgot-container .form-group label { display: block; margin-bottom: 6px; font-weight: 600; }
        .forgot-container .form-group input { width: 100%; padding: 10px 14px; border: 1px solid var(--border,#333); border-radius: 8px; background: var(--surface,#111); color: var(--text,#fff); font-size: 15px; box-sizing: border-box; }
        .forgot-container .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #A259FF; color: #fff; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-msg { text-align: center; margin-top: 12px; font-size: 14px; }
        .status-msg.success { color: #0ACF83; }
        .status-msg.error { color: #ff4d4f; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--muted,#888); }
    </style>
</head>
<body>
    <header class="wb-nav" id="top">
        <a class="wb-brand" href="index.html" aria-label="易聊智能首页">
            <svg class="wb-logo" viewBox="0 0 48 48" role="img">
                <rect x="5" y="8" width="30" height="25" rx="9" fill="#fff" stroke="#0A0A0A" stroke-width="3"></rect>
                <path d="M14 36 L10 44 L23 36" fill="#fff" stroke="#0A0A0A" stroke-width="3" stroke-linejoin="round"></path>
                <circle cx="17" cy="20" r="4" fill="#A259FF"></circle>
                <circle cx="31" cy="18" r="4" fill="#1ABCFE"></circle>
                <circle cx="28" cy="30" r="4" fill="#0ACF83"></circle>
                <path d="M20 20 L27 18 M29 22 L28 26" stroke="#0A0A0A" stroke-width="2.5" stroke-linecap="round"></path>
            </svg>
            <span>易聊智能</span>
        </a>
        <nav class="wb-nav-links" aria-label="导航">
            <a href="index.html">首页</a>
            <a href="chat.html">控制台</a>
            <a href="models.html">模型列表</a>
        </nav>
    </header>

    <main class="forgot-container">
        <!-- 步骤1：输入邮箱 -->
        <div id="stepEmail" class="forgot-step active">
            <h1>找回密码</h1>
            <p class="subtitle">输入注册时使用的安全邮箱，获取验证码</p>
            <div class="form-group">
                <label for="resetEmail">安全邮箱</label>
                <input type="email" id="resetEmail" placeholder="请输入注册邮箱" autocomplete="email">
            </div>
            <button class="btn btn-primary" id="sendCodeBtn" type="button">发送验证码</button>
            <div id="emailStatus" class="status-msg"></div>
        </div>

        <!-- 步骤2：输入验证码 + 新密码 -->
        <div id="stepReset" class="forgot-step">
            <h1>重置密码</h1>
            <p class="subtitle">验证码已发送，请查收邮件</p>
            <div class="form-group">
                <label for="resetCode">验证码</label>
                <input type="text" id="resetCode" placeholder="6位数字验证码" maxlength="6">
            </div>
            <div class="form-group">
                <label for="newPassword">新密码</label>
                <input type="password" id="newPassword" placeholder="至少6位，含字母和数字">
            </div>
            <div class="form-group">
                <label for="confirmNewPassword">确认新密码</label>
                <input type="password" id="confirmNewPassword" placeholder="再次输入新密码">
            </div>
            <button class="btn btn-primary" id="resetBtn" type="button">重置密码</button>
            <div id="resetStatus" class="status-msg"></div>
        </div>

        <a class="back-link" href="signin.html">← 返回登录</a>
    </main>

    <script>
        let currentEmail = '';

        function getBackendUrl() {
            try {
                const cfg = JSON.parse(localStorage.getItem('aiai_chat_config') || '{}');
                if (cfg.apiBase?.trim()) return cfg.apiBase.trim();
            } catch {}
            if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') return 'http://localhost:3000';
            if (!location.hostname || location.protocol === 'file:') return 'http://localhost:3000';
            return '';
        }

        function showStep(stepId) {
            document.querySelectorAll('.forgot-step').forEach(s => s.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        function setStatus(elId, msg, type) {
            const el = document.getElementById(elId);
            el.textContent = msg;
            el.className = 'status-msg ' + type;
        }

        // 步骤1：发送验证码
        document.getElementById('sendCodeBtn').addEventListener('click', async () => {
            const email = document.getElementById('resetEmail').value.trim();
            if (!email || !email.includes('@')) {
                setStatus('emailStatus', '请输入有效的邮箱地址', 'error');
                return;
            }

            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            btn.textContent = '发送中...';
            setStatus('emailStatus', '', '');

            try {
                const res = await fetch(`${getBackendUrl()}/api/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || '发送失败');

                currentEmail = email;

                // 开发模式：显示验证码
                if (data.debug_code) {
                    setStatus('emailStatus', `开发模式 - 验证码: ${data.debug_code}`, 'success');
                    // 自动填入验证码
                    document.getElementById('resetCode').value = data.debug_code;
                } else {
                    setStatus('emailStatus', '', '');
                }
                showStep('stepReset');
            } catch (err) {
                setStatus('emailStatus', err.message, 'error');
                btn.disabled = false;
                btn.textContent = '发送验证码';
            }
        });

        // 步骤2：重置密码
        document.getElementById('resetBtn').addEventListener('click', async () => {
            const code = document.getElementById('resetCode').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;

            if (!code || code.length !== 6) {
                setStatus('resetStatus', '请输入6位验证码', 'error');
                return;
            }
            if (newPassword.length < 6 || !/[A-Za-z]/.test(newPassword) || !/\d/.test(newPassword)) {
                setStatus('resetStatus', '密码至少6位，且必须含字母和数字', 'error');
                return;
            }
            if (newPassword !== confirmPassword) {
                setStatus('resetStatus', '两次密码不一致', 'error');
                return;
            }

            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.textContent = '重置中...';

            try {
                const res = await fetch(`${getBackendUrl()}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, code, new_password: newPassword }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || '重置失败');

                setStatus('resetStatus', '密码重置成功！即将跳转登录页...', 'success');
                setTimeout(() => { window.location.href = 'signin.html'; }, 2000);
            } catch (err) {
                setStatus('resetStatus', err.message, 'error');
                btn.disabled = false;
                btn.textContent = '重置密码';
            }
        });
    </script>
</body>
</html>
