<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易聊智能 - AI 对话</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-workspace">
    <header class="chat-topbar">
        <a class="chat-brand" href="index.html" aria-label="易聊智能首页">
            <svg class="chat-logo" viewBox="0 0 48 48" role="img" aria-label="易聊智能标识">
                <rect x="5" y="8" width="30" height="25" rx="9" fill="#fff" stroke="#0A0A0A" stroke-width="3"></rect>
                <path d="M14 36 L10 44 L23 36" fill="#fff" stroke="#0A0A0A" stroke-width="3" stroke-linejoin="round"></path>
                <circle cx="17" cy="20" r="4" fill="#A259FF"></circle>
                <circle cx="31" cy="18" r="4" fill="#1ABCFE"></circle>
                <circle cx="28" cy="30" r="4" fill="#0ACF83"></circle>
                <path d="M20 20 L27 18 M29 22 L28 26" stroke="#0A0A0A" stroke-width="2.5" stroke-linecap="round"></path>
            </svg>
            <strong>易聊智能</strong>
        </a>
        <nav class="chat-nav" aria-label="主导航">
            <a href="index.html">首页</a>
            <a href="chat.html" class="active">控制台</a>
            <a href="models.html">模型列表</a>
            <a href="index.html#pricing">充值</a>
            <a href="index.html#docs">文档</a>
        </nav>
        <div class="chat-user-tools">
            <a class="chat-community" href="models.html">加入交流群，私信群主领3美金额度</a>
            <button type="button" aria-label="通知">⌂</button>
            <button type="button" aria-label="主题">☼</button>
            <button type="button" aria-label="语言">文</button>
            <button class="chat-account" id="settingsBtn" type="button">
                <span>G</span>
                <strong>google_1214</strong>
                <small>⌄</small>
            </button>
        </div>
    </header>

    <main class="chat-app-shell">
        <aside class="chat-sidebar">
            <div class="playground-label">
                <span>‹</span>
                <strong>● 在线体验 · PLAYGROUND</strong>
            </div>
            <button class="new-chat-orange" id="newChatBtn" type="button">＋ 新对话</button>
            <h2>对话历史</h2>
            <div id="chatList" class="chat-list"></div>

            <div class="sidebar-account">
                <div class="sidebar-user">
                    <span>G</span>
                    <div>
                        <strong>google_1214</strong>
                        <small>余额 $0.00</small>
                    </div>
                </div>
                <div class="sidebar-actions">
                    <button type="button">☾ 夜间</button>
                    <button type="button">▦ 控制台</button>
                </div>
            </div>
        </aside>

        <section class="chat-main-panel">
            <div class="chat-modelbar">
                <span class="modelbar-label">点这锐</span>
                <label class="model-pill primary">
                    <span>▱</span>
                    <select id="modelSelect" aria-label="选择 AI 模型"></select>
                </label>
                <input id="modelSearch" class="model-search-hidden" type="search" aria-label="搜索模型">
                <button class="model-pill" type="button">▱ GPT-5.5</button>
                <button class="model-pill" type="button">▧ 生图</button>
                <button class="model-pill more" type="button">更多模型⌄</button>
                <label class="context-switch">
                    <input id="contextToggle" type="checkbox">
                    <span>使用上下文</span>
                </label>
                <span id="modeLabel" class="mode-label">单次对话</span>
                <button class="advanced-link" id="advancedBtn" type="button">⚙ 高级设置</button>
            </div>

            <div id="messages" class="chat-canvas">
                <div class="empty-state">
                    <span class="bot-icon">⌁</span>
                    <h2>开始新的对话</h2>
                    <p>选择一个模型，开始您的智能对话之旅</p>
                </div>
                <div class="scroll-controls" aria-hidden="true">
                    <button id="scrollUpBtn">⌃</button>
                    <button id="scrollDownBtn">⌄</button>
                </div>
            </div>

            <div class="chat-composer">
                <button class="attach-btn" type="button" aria-label="上传附件">⌕</button>
                <textarea id="userInput" rows="1" placeholder="请输入您的问题..."></textarea>
                <span id="tokenCount" class="token-count"></span>
                <button class="secondary-btn clear-chat-ghost" id="clearChatBtn" type="button">清空</button>
                <button class="send-round-btn" id="sendBtn" type="button">↑</button>
            </div>
        </section>
    </main>

    <div id="settingsModal" class="modal" hidden>
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2>高级设置</h2>
                    <p>配置接口、提示词和生成参数</p>
                </div>
                <button class="close-btn" id="closeSettings" aria-label="关闭设置">&times;</button>
            </div>
            <div class="modal-body">
                <!-- API Key 来源选择 -->
                <div class="form-group" style="border: 1px solid var(--border, #333); padding: 15px; border-radius: 8px; margin-bottom: 20px; background: var(--surface-hover, #1a1a1a);">
                    <span style="display: block; margin-bottom: 10px; font-weight: 600;">API Key 来源</span>
                    <label style="display: flex; align-items: center; margin-bottom: 8px; cursor: pointer;">
                        <input type="radio" name="keySource" value="platform" id="usePlatformKey" checked style="margin-right: 8px;">
                        <span>使用平台 Key 池（推荐）- 按 token 计费，享受折扣优惠</span>
                    </label>
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="radio" name="keySource" value="own" id="useOwnKey" style="margin-right: 8px;">
                        <span>使用自己的 API Key - 仅收取小额通道服务费</span>
                    </label>
                    <p style="margin-top: 10px; font-size: 0.85em; color: var(--muted, #888); line-height: 1.4;">
                        💡 自带 Key 需自行承担 AI 提供商费用 + 平台通道服务费 ¥0.5/万token
                    </p>
                </div>

                <!-- API Key 输入框（仅在使用自己的 Key 时显示）-->
                <div class="form-grid" id="apiKeyInputs" style="display: none;">
                    <label class="form-group">
                        <span>DeepSeek API Key</span>
                        <input type="password" id="apiKeyDeepseek" placeholder="sk-...">
                    </label>
                    <label class="form-group">
                        <span>OpenAI API Key</span>
                        <input type="password" id="apiKeyOpenai" placeholder="sk-...">
                    </label>
                    <label class="form-group">
                        <span>OpenRouter API Key</span>
                        <input type="password" id="apiKeyOpenrouter" placeholder="sk-or-...">
                    </label>
                </div>

                <!-- 后端地址（开发调试用）-->
                <label class="form-group" style="margin-top: 15px;">
                    <span>后端服务地址（留空自动检测）</span>
                    <input type="text" id="apiBase" placeholder="留空则自动使用：本地 http://localhost:3000 或生产环境相对路径">
                </label>
                <label class="form-group">
                    <span>系统提示词</span>
                    <textarea id="systemPrompt" rows="3" placeholder="你是一个有帮助的AI助手。"></textarea>
                </label>
                <div class="settings-row">
                    <label class="form-group">
                        <span>Temperature <b id="tempValue">0.7</b></span>
                        <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
                    </label>
                    <label class="form-group small-field">
                        <span>上下文消息数</span>
                        <input type="number" id="contextMessages" min="1" max="50" value="10">
                    </label>
                </div>
                <button class="primary-btn full" id="saveSettings" type="button">保存设置</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
