# ============================================================
# 易聊智能 - docker-compose.yml
# 一键启动：docker compose up -d
# ============================================================

version: "3.8"

services:
  # ---- Nginx 反向代理（对外暴露 80/443）----
  nginx:
    image: nginx:alpine
    container_name: yiliao-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro              # SSL 证书目录（可选）
      - ./chat.html:/usr/share/nginx/html/chat.html:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./login.html:/usr/share/nginx/html/login.html:ro
      - ./signin.html:/usr/share/nginx/html/signin.html:ro
      - ./forgot-password.html:/usr/share/nginx/html/forgot-password.html:ro
      - ./models.html:/usr/share/nginx/html/models.html:ro
      - ./admin.html:/usr/share/nginx/html/admin.html:ro
      - ./style.css:/usr/share/nginx/html/style.css:ro
      - ./app.js:/usr/share/nginx/html/app.js:ro
      - ./home.js:/usr/share/nginx/html/home.js:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - yiliao-net

  # ---- Node.js 后端 ----
  backend:
    build: .
    container_name: yiliao-backend
    expose:
      - "3000"
    volumes:
      - yiliao_data:/app/data             # 数据库持久化
    environment:
      - NODE_ENV=production
      - PORT=3000
      # AI API Keys（从 .env 文件注入或直接写这里）
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_KEY_1=${DEEPSEEK_KEY_1}
      - DEEPSEEK_KEY_2=${DEEPSEEK_KEY_2:-}
      - DEEPSEEK_KEY_3=${DEEPSEEK_KEY_3:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # JWT 密钥
      - JWT_SECRET=${JWT_SECRET}
      # 邮件配置
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      # 服务费
      - SERVICE_FEE_PER_10K_TOKENS=${SERVICE_FEE_PER_10K_TOKENS:-0.5}
    restart: unless-stopped
    networks:
      - yiliao-net

volumes:
  yiliao_data:     # SQLite 数据库文件持久化

networks:
  yiliao-net:
    driver: bridge
