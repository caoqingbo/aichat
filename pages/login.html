<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 易聊智能</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="page-shell">
    <header class="page-header">
        <a class="page-brand" href="../index.html">易聊智能</a>
        <nav class="page-nav" aria-label="注册页导航">
            <a href="../index.html">首页</a>
            <a href="models.html">模型列表</a>
            <a href="signin.html">登陆</a>
        </nav>
    </header>

    <main class="page-main">
        <section class="page-hero">
            <div class="page-hero-inner">
                <div>
                    <span class="eyebrow">注册账号</span>
                    <h1>从一个账号开始连接所有 AI 模型</h1>
                    <p>创建统一账号后，可以继续接入模型、管理额度和查看团队使用情况。</p>
                </div>
                <div class="panel">
                    <h3>注册收益</h3>
                    <div class="link-list">
                        <div class="link-item"><strong>统一配置</strong><span>无需重复维护多个模型入口。</span></div>
                        <div class="link-item"><strong>成本透明</strong><span>在一个界面里查看费用与额度。</span></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="page-section">
            <div class="auth-grid">
                <article class="auth-card">
                    <h2>创建新账号</h2>
                    <p>当前为演示页面，可在此基础上继续接入真实注册流程。</p>
                    <form data-demo-form>
                        <label>
                            <span class="sr-only">团队名称</span>
                            <input type="text" name="displayName" autocomplete="organization" placeholder="团队或个人名称">
                        </label>
                        <label>
                            <span class="sr-only">邮箱</span>
                            <input type="email" name="email" autocomplete="email" placeholder="邮箱地址">
                        </label>
                        <label>
                            <span class="sr-only">密码</span>
                            <input type="password" name="password" autocomplete="new-password" placeholder="设置密码">
                        </label>
                        <button class="wb-btn wb-btn-primary" type="submit">注册</button>
                    </form>
                    <div class="form-message" data-form-message></div>
                </article>
            </div>
        </section>
    </main>

    <script src="../assets/js/app.js"></script>
</body>
</html>
