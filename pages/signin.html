<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登陆 - 易聊智能</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="page-shell">
    <header class="page-header">
        <a class="page-brand" href="../index.html">易聊智能</a>
        <nav class="page-nav" aria-label="登录页导航">
            <a href="../index.html">首页</a>
            <a href="models.html">模型列表</a>
            <a href="login.html">注册</a>
        </nav>
    </header>

    <main class="page-main">
        <section class="page-hero">
            <div class="page-hero-inner">
                <div>
                    <span class="eyebrow">登陆账号</span>
                    <h1>回到你的 AI 工作台</h1>
                    <p>集中查看历史对话、常用模型与额度信息，继续你的工作流。</p>
                </div>
                <div class="panel">
                    <h3>登录后可用</h3>
                    <div class="link-list">
                        <div class="link-item"><strong>统一历史记录</strong><span>查看全部模型的会话记录。</span></div>
                        <div class="link-item"><strong>调用统计</strong><span>快速了解 token 和成本趋势。</span></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="page-section">
            <div class="auth-grid">
                <article class="auth-card">
                    <h2>账号登陆</h2>
                    <p>当前为演示页面，可直接作为后续接入真实认证接口的结构基础。</p>
                    <form data-demo-form>
                        <label>
                            <span class="sr-only">邮箱</span>
                            <input type="email" name="email" autocomplete="username" placeholder="邮箱地址">
                        </label>
                        <label>
                            <span class="sr-only">密码</span>
                            <input type="password" name="password" autocomplete="current-password" placeholder="密码">
                        </label>
                        <button class="wb-btn wb-btn-primary" type="submit">登陆</button>
                    </form>
                    <div class="form-message" data-form-message></div>
                </article>
            </div>
        </section>
    </main>

    <script src="../assets/js/app.js"></script>
</body>
</html>
